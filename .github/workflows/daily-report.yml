name: Geriatric Depression Daily Report

on:
  schedule:
    - cron: "35 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "24"

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi
          echo "Date: $(grep target "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Fetch papers from PubMed
        env:
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
        run: |
          node scripts/fetch-papers.mjs
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"papers"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json');console.log(d.papers?d.papers.length:0)")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo '{"date":"","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        if: steps.papers.outputs.count != '0'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          TARGET_DATE: ${{ steps.date.outputs.target }}
        run: |
          node scripts/generate-report.mjs

      - name: Generate index page
        run: |
          node scripts/generate-index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📄 geriatric depression daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        if: always()
        run: |
          echo "### 📄 Geriatric Depression Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${{ steps.date.outputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [geriatric-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/elder-depression/geriatric-${{ steps.date.outputs.target }}.html)" >> "$GITHUB_STEP_SUMMARY"
